<html lang="en">
<head>

<body>

    <script>

        let x = 10;
        let y = 20;
        let z ='10';
      //operatori de comparatie
        console.log(x >= y);
        console.log( x <= y);
        console.log( x != y);
        console.log( x == y);
        console.log( x = y);
        console.log( x === y);
        console.log( typeof x, typeof z);
        console.log( x + z );

        // operatori logici
            console.log(( x >= y) && ( x == z));
            console.log(( x >= y) || ( x == z));

            console.log(( x >= y) & ( x == z));
            console.log(( x >= y) | ( x == z));

            console.log( (x==z) | (x=30));
            console.log('valoarea lui x este:', x);

          //operator ternal
          console.log((x === z) ? 'adevarat':'fals');
          console.log((x = z) ? 'adevarat':'fals');
          console.log((x == z) ? 'adevarat':'fals');

          
          
    </script>
