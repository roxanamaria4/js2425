<body>
    <script>
      function produsNou(nume, pret, stoc, dataFbricarii) {
            this.nume = nume;
            this.pret = pret;
            this.stoc = stoc;
            this.dataFbricarii = dataFbricarii;
            this.afiseaza = function() {
                console.log(`Produsul ${this.nume} costa ${this.pret} lei`)
            },
            this.cumpara = function () {
                if (this.stoc > 0) {
                    this.stoc -=1;
                    console.log(`Produsul ${this.nume} a fost adaugat in cos`)
                }
            }

        }
        const paine = new produsNou('Paine', 8, 36, '2020-0-22');
        paine.afiseaza();
        paine.cumpara();
       
            const paineNeagra = Object.assign(paine);
         paineNeagra.afiseaza();
         paineNeagra.nume = 'Paine neagra cu seminte';
        console.log(paineNeagra);
       

        //Prototype
          const paineCuSeminte = Object.create(paine);
          console.log(paineCuSeminte);
         // paineCuSeminte.nume = 'Paine cu seminte';
         paineCuSeminte.__proto__.nume = 'Pine cu seminte';
         console.log(paineCuSeminte);
          paineCuSeminte.afiseaza();

        </script>
