<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    //metoda Caesar
    <script languages="JavaScript">
        function Caesar() {
            let f = document.getElementById("key").value;
            let x = document.getElementById("myTextArea").value;
            let key1 = Number(f);
            console.log(key1);
            let result = "";

            for (let i = 0, len = x.length; i < len; i++){
                if (x[i] == " ") {
                    result = result + " ";
                    continue;
                }
                if (x[i] = x[i].toUpperCase()){
                    let myCar = x[i].charCodeAt(0);
                    let e = ((myCar - 65 +key1) % 26) + 97;
                    result = result + String.fromCharCode(e).toUpperCase();
                }
                else if (x[i] == x[i].toLowerCase()){
                    let myCar = x[i].charCodeAt(0);
                    let e = ((myCar - 97 + key1) % 26) +97 ;
                    result = result + String.fromCharCode(e);
                }
                else {
                result = result + x[i];
                }
            }
            document.getElementById("result").value = result;
                }
       </script>
       <div class="input">
        <textarea id="myTextArea" rows="6" cols="80"></textarea>
       </div>
       <div class="user">
          <label><b>Key</b></label>
          <input type="number" id="key" value="0" />
          <button onclick="Caesar()">Convert</button>
       </div>
       
       <div class="resulta">
        <textarea id="result" rows="6" cols="80"></textarea>
       </div>
</body>
</html>
